name: Update ICS

on:
  workflow_dispatch:
  # schedule:
    # - cron: "5 15 * * *"   # every day 00:05 KST = 15:05 UTC previous day

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate ICS files
        run: python scripts/generate_ics.py

      - name: Commit updated ICS files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "Update ICS files"
          git push